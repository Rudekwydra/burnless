<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burnless Pro — payment received</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-alt: #141414;
    --fg: #f5f5f5;
    --muted: #888;
    --accent: #ff6b35;
    --accent-glow: rgba(255, 107, 53, 0.15);
    --border: #222;
    --mono: ui-monospace, SF Mono, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .container { max-width: 760px; margin: 0 auto; padding: 0 24px; }
  header { padding: 32px 0; border-bottom: 1px solid var(--border); }
  header .container { display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: var(--mono); font-weight: 600; font-size: 18px; letter-spacing: -0.01em; }
  .logo span { color: var(--accent); }
  nav a { color: var(--muted); text-decoration: none; font-size: 14px; }
  nav a:hover { color: var(--fg); }
  main { padding: 96px 0; }
  .panel {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 0 80px var(--accent-glow);
  }
  h1 {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.08;
    margin-bottom: 20px;
  }
  p { color: var(--muted); font-size: 17px; margin-bottom: 16px; }
  #key { color: var(--fg); font-family: var(--mono); overflow-wrap: anywhere; }
  pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-family: var(--mono);
    font-size: 14px;
    overflow-x: auto;
    line-height: 1.6;
  }
</style>
</head>
<body>
<header>
  <div class="container">
    <div class="logo">burn<span>less</span></div>
    <nav><a href="/">Back to home</a></nav>
  </div>
</header>
<main>
  <div class="container">
    <div class="panel">
      <h1>Burnless Pro — payment received</h1>
      <p>Thanks for buying Burnless Pro.</p>
      <p>Your activation key (also sent by email): <span id="key">SESSION_ID_HERE</span></p>
      <pre id="command">burnless license activate SESSION_ID_HERE</pre>
    </div>
  </div>
</main>
<script>
  const params = new URLSearchParams(window.location.search);
  const key = params.get("session_id") || "SESSION_ID_HERE";
  document.getElementById("key").textContent = key;
  document.getElementById("command").textContent = `burnless license activate ${key}`;
</script>
</body>
</html>
