[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "burnless"
version = "0.3.0"
description = "Stop burning tokens on repeated context."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Roberto Monticelli Wydra" }]
license = { text = "MIT" }
dependencies = [
    "anthropic>=0.40",
    "prompt-toolkit>=3.0",
    "PyYAML>=6.0",
    "rich>=13.0",
]

[project.scripts]
burnless = "burnless.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/burnless"]
